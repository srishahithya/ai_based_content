<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: url('https://www.shutterstock.com/image-photo/elearning-technology-concept-ai-machine-600nw-2480344323.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
            overflow: hidden;
        }

        /* Overlay for better text visibility */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.85) 0%, rgba(118, 75, 162, 0.85) 100%);
            z-index: 1;
        }

        /* Animated background particles */
        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(255, 255, 255, 0.08) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
            z-index: 2;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-20px) rotate(1deg); }
            66% { transform: translateY(20px) rotate(-1deg); }
        }

        /* Login container */
        .login-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideInUp 0.6s ease-out;
            position: relative;
            z-index: 10;
            min-width: 400px;
            max-width: 90%;
        }

        @keyframes slideInUp {
            0% {
                opacity: 0;
                transform: translateY(50px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        /* Animated underline */
        h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, #fff, #ffd700, #fff);
            animation: expandLine 1s ease-out forwards;
            animation-delay: 0.3s;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        @keyframes expandLine {
            to {
                width: 60%;
            }
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        label {
            color: white;
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: -0.5rem;
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
        }

        label:nth-of-type(1) { animation-delay: 0.4s; }
        label:nth-of-type(2) { animation-delay: 0.6s; }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 1rem 1.5rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            animation: fadeInScale 0.8s ease-out forwards;
            opacity: 0;
            transform: scale(0.95);
        }

        input[type="text"]:nth-of-type(1) { animation-delay: 0.5s; }
        input[type="password"]:nth-of-type(2) { animation-delay: 0.7s; }

        @keyframes fadeInScale {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Placeholder styling */
        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        button[type="submit"] {
            padding: 1rem 2rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: fadeInScale 0.8s ease-out forwards;
            animation-delay: 0.9s;
            opacity: 0;
            transform: scale(0.95);
            position: relative;
            overflow: hidden;
        }

        /* Shimmer effect on button */
        button[type="submit"]::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        button[type="submit"]:hover::before {
            left: 100%;
        }

        button[type="submit"]:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        button[type="submit"]:active {
            transform: translateY(-1px);
        }

        a {
            color: white;
            text-decoration: none;
            font-size: 1rem;
            margin-top: 2rem;
            text-align: center;
            padding: 0.8rem 1.5rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            animation: fadeIn 1s ease-out forwards;
            animation-delay: 1.1s;
            opacity: 0;
            position: relative;
            z-index: 10;
            display: inline-block;
        }

        a:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        /* Floating security icons */
        .security-icon {
            position: absolute;
            font-size: 2rem;
            opacity: 0.1;
            animation: floatIcon 10s infinite ease-in-out;
            z-index: 3;
        }

        .icon1 {
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .icon2 {
            top: 20%;
            right: 15%;
            animation-delay: 2s;
        }

        .icon3 {
            bottom: 20%;
            left: 15%;
            animation-delay: 4s;
        }

        @keyframes floatIcon {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(10deg);
            }
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .login-container {
                padding: 2rem;
                min-width: 320px;
            }

            h2 {
                font-size: 2rem;
            }

            input, button {
                font-size: 0.95rem;
            }
        }

        /* Loading animation for form submission */
        .loading {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Security icons decoration -->
    <div class="security-icon icon1">🔒</div>
    <div class="security-icon icon2">🛡️</div>
    <div class="security-icon icon3">🔐</div>

    <div class="login-container">
        <h2>Admin Login</h2>

        <form method="POST" id="loginForm">
            <label for="username">Username:</label> 
            <input type="text" id="username" name="username" required placeholder="Enter your username">
            
            <label for="password">Password:</label> 
            <input type="password" id="password" name="password" required placeholder="Enter your password">
            
            <button type="submit">Login</button>
            <div class="loading" id="loading"></div>
        </form>

        <a href="/">Back to Home</a>
    </div>

    <script>
        // Add form submission animation
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const button = this.querySelector('button[type="submit"]');
            const loading = document.getElementById('loading');
            
            button.style.display = 'none';
            loading.style.display = 'block';
            
            // Simulate loading (remove this in production)
            setTimeout(() => {
                button.style.display = 'block';
                loading.style.display = 'none';
            }, 2000);
        });

        // Add input validation animation
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('blur', function() {
                if (this.value.trim() === '') {
                    this.style.borderColor = 'rgba(255, 100, 100, 0.5)';
                    this.style.animation = 'shake 0.5s';
                } else {
                    this.style.borderColor = 'rgba(100, 255, 100, 0.5)';
                }
            });

            input.addEventListener('focus', function() {
                this.style.borderColor = 'rgba(255, 255, 255, 0.3)';
            });
        });

        // Shake animation for invalid inputs
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                75% { transform: translateX(10px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
