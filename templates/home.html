<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background particles - faster */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(255, 255, 255, 0.08) 0%, transparent 50%);
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }

        /* Floating geometric shapes - faster */
        .shape {
            position: absolute;
            opacity: 0.1;
            animation: floatShape 8s infinite ease-in-out;
        }

        .shape1 {
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, #fff, transparent);
            top: 10%;
            left: 10%;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            animation-delay: 0s;
        }

        .shape2 {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #fff, transparent);
            top: 70%;
            right: 10%;
            border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%;
            animation-delay: 1s;
        }

        .shape3 {
            width: 100px;
            height: 100px;
            background: linear-gradient(225deg, #fff, transparent);
            bottom: 10%;
            left: 15%;
            border-radius: 41% 59% 41% 59% / 41% 59% 41% 59%;
            animation-delay: 2s;
        }

        @keyframes floatShape {
            0%, 100% { 
                transform: translate(0, 0) rotate(0deg);
                opacity: 0.1;
            }
            50% { 
                transform: translate(-20px, -20px) rotate(180deg);
                opacity: 0.15;
            }
        }

        h2 {
            color: white;
            font-size: 3rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 3rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            animation: slideInFromTop 0.5s ease-out;
            position: relative;
            z-index: 10;
        }

        @keyframes slideInFromTop {
            0% {
                opacity: 0;
                transform: translateY(-30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Glowing underline animation - faster */
        h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, #fff, #ffd700, #fff);
            animation: expandLine 0.8s ease-out forwards;
            animation-delay: 0.2s;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        @keyframes expandLine {
            to {
                width: 80%;
            }
        }

        .nav-container {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        a {
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 500;
            padding: 1rem 2rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: fadeInScale 0.4s ease-out forwards;
            opacity: 0;
            transform: scale(0.9);
        }

        a:nth-child(1) { animation-delay: 0.1s; }
        a:nth-child(2) { animation-delay: 0.2s; }
        a:nth-child(3) { animation-delay: 0.3s; }

        @keyframes fadeInScale {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Shimmer effect on hover - faster */
        a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.3s;
        }

        a:hover::before {
            left: 100%;
        }

        a:hover {
            transform: translateY(-3px) scale(1.02);
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2),
                        0 0 15px rgba(255, 255, 255, 0.3);
        }

        a:active {
            transform: translateY(-1px) scale(1.01);
        }

        /* Removed pulse animation for faster response */

        /* Responsive design */
        @media (max-width: 768px) {
            h2 {
                font-size: 2rem;
                padding: 0 1rem;
            }

            .nav-container {
                flex-direction: column;
                gap: 1rem;
                padding: 0 1rem;
            }

            a {
                width: 200px;
                text-align: center;
            }
        }

        /* Simplified loading dots - faster */
        .loading-dots {
            position: absolute;
            bottom: 50px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: bounce 1s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.2s; }
        .dot:nth-child(2) { animation-delay: -0.1s; }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <!-- Animated background shapes -->
    <div class="shape shape1"></div>
    <div class="shape shape2"></div>
    <div class="shape shape3"></div>

    <h2>Welcome to AI-Based Personalized Learning System</h2>

    <div class="nav-container">
        <a href="/admin/login">Admin</a>
        <a href="/user/register">User Register</a>
        <a href="/user/login">User Login</a>
    </div>

    <!-- Loading dots animation -->
    <div class="loading-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <script>
        // Simplified mouse effect - faster response
        let ticking = false;
        document.addEventListener('mousemove', (e) => {
            if (!ticking) {
                requestAnimationFrame(() => {
                    const shapes = document.querySelectorAll('.shape');
                    const x = e.clientX / window.innerWidth;
                    const y = e.clientY / window.innerHeight;

                    shapes.forEach((shape, index) => {
                        const speed = (index + 1) * 10;
                        shape.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
                    });
                    ticking = false;
                });
                ticking = true;
            }
        });

        // Faster click ripple effect
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                const ripple = document.createElement('span');
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const x = e.clientX - rect.left - size / 2;
                const y = e.clientY - rect.top - size / 2;

                ripple.style.cssText = `
                    position: absolute;
                    width: ${size}px;
                    height: ${size}px;
                    border-radius: 50%;
                    background: rgba(255, 255, 255, 0.5);
                    left: ${x}px;
                    top: ${y}px;
                    animation: ripple 0.4s ease-out;
                    pointer-events: none;
                `;

                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 400);
            });
        });

        // Faster ripple animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                to {
                    transform: scale(3);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
