<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Courses</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background-image: url('https://www.shutterstock.com/image-photo/elearning-technology-concept-ai-machine-600nw-2480344323.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
            overflow-x: hidden;
        }

        /* Overlay gradient */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(20, 30, 48, 0.92) 0%, rgba(36, 59, 85, 0.92) 100%);
            z-index: 1;
        }

        /* Animated background pattern */
        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(79, 172, 254, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(245, 87, 108, 0.05) 0%, transparent 50%);
            animation: floatPattern 25s ease-in-out infinite;
            z-index: 2;
        }

        @keyframes floatPattern {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(-10px, -10px) rotate(1deg); }
            66% { transform: translate(10px, -5px) rotate(-1deg); }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 10;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header section */
        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: slideDown 0.8s ease-out;
        }

        h2 {
            color: white;
            font-size: 3rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 1rem;
            position: relative;
            display: inline-block;
        }

        /* Icon in heading */
        h2 i {
            margin-right: 1rem;
            color: #4facfe;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Animated underline */
        h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 4px;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            animation: expandLine 1s ease-out forwards;
            animation-delay: 0.3s;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.5);
        }

        @keyframes expandLine {
            to { width: 100%; }
        }

        /* Section headers */
        h3 {
            color: white;
            font-size: 2rem;
            font-weight: 600;
            margin: 2rem 0 1.5rem;
            position: relative;
            padding-left: 2rem;
            animation: fadeIn 0.8s ease-out forwards;
        }

        h3 i {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            color: #4facfe;
            font-size: 1.5rem;
        }

        /* Form container */
        .form-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 3rem;
            animation: slideUp 0.8s ease-out forwards;
            animation-delay: 0.2s;
            opacity: 0;
        }

        @keyframes slideUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Form styling */
        form {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        label {
            color: white;
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: -0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        label i {
            color: #4facfe;
            font-size: 1rem;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 1rem 1.5rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
        }

        input[type="text"]:nth-of-type(1) { animation-delay: 0.3s; }
        textarea { animation-delay: 0.4s; }
        select { animation-delay: 0.5s; }
        input[type="text"]:nth-of-type(2) { animation-delay: 0.6s; }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Placeholder styling */
        input::placeholder,
        textarea::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        /* Select option styling */
        select option {
            background: #2c3e50;
            color: white;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #4facfe;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.3);
            transform: translateY(-2px);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        /* Button styling */
        button {
            padding: 1rem 2rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: fadeIn 0.8s ease-out forwards;
            animation-delay: 0.7s;
            opacity: 0;
            position: relative;
            overflow: hidden;
            justify-self: start;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        button i {
            font-size: 1rem;
        }

        /* Shimmer effect on button */
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        button:active {
            transform: translateY(-1px);
        }

        /* Horizontal rule */
        hr {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            margin: 3rem 0;
            position: relative;
        }

        hr::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 30%;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            animation: expandLine 3s ease-out infinite;
            animation-delay: 1s;
        }

        /* Table container */
        .table-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideUp 0.8s ease-out forwards;
            animation-delay: 0.4s;
            opacity: 0;
            overflow-x: auto;
        }

        /* Table styling */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border-radius: 10px;
            overflow: hidden;
        }

        /* Table header */
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1.2rem 1.5rem;
            text-align: left;
            font-weight: 600;
            font-size: 1.1rem;
            position: relative;
            transition: all 0.3s ease;
        }

        th:first-child {
            border-top-left-radius: 10px;
        }

        th:last-child {
            border-top-right-radius: 10px;
        }

        th i {
            margin-right: 0.5rem;
            font-size: 0.9rem;
        }

        th:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            transform: translateY(-2px);
        }

        /* Table rows */
        tr {
            transition: all 0.3s ease;
            animation: fadeInRow 0.5s ease-out forwards;
            opacity: 0;
        }

        tr:nth-child(odd) {
            background: rgba(255, 255, 255, 0.05);
        }

        tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.02);
        }

        /* Staggered row animations */
        tr:nth-child(2) { animation-delay: 0.1s; }
        tr:nth-child(3) { animation-delay: 0.2s; }
        tr:nth-child(4) { animation-delay: 0.3s; }
        tr:nth-child(5) { animation-delay: 0.4s; }
        tr:nth-child(6) { animation-delay: 0.5s; }
        tr:nth-child(7) { animation-delay: 0.6s; }
        tr:nth-child(8) { animation-delay: 0.7s; }

        @keyframes fadeInRow {
            to {
                opacity: 1;
                transform: translateX(0);
            }
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
        }

        /* Table cells */
        td {
            padding: 1.2rem 1.5rem;
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        /* Row hover effects */
        tr:hover td {
            background: rgba(79, 172, 254, 0.1);
            color: white;
            transform: translateX(5px);
        }

        tr:hover td:first-child {
            border-left: 3px solid #4facfe;
        }

        /* ID cell styling */
        td:first-child {
            font-weight: 600;
            color: #4facfe;
            position: relative;
        }

        td:first-child::before {
            content: '#';
            margin-right: 0.3rem;
            opacity: 0.5;
        }

        /* Level badge styling */
        td:nth-child(4) {
            font-weight: 500;
        }

        /* Edit link styling */
        td:last-child a {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(79, 172, 254, 0.2);
            border: 1px solid rgba(79, 172, 254, 0.3);
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        td:last-child a:hover {
            background: rgba(79, 172, 254, 0.3);
            border-color: rgba(79, 172, 254, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.3);
        }

        /* Back button */
        .back-container {
            text-align: center;
            margin-top: 3rem;
            animation: fadeIn 1s ease-out forwards;
            animation-delay: 0.8s;
            opacity: 0;
        }

        .back-container a {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .back-container a i {
            transition: transform 0.3s ease;
        }

        .back-container a:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .back-container a:hover i {
            transform: translateX(-5px);
        }

        /* Shimmer effect */
        .back-container a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .back-container a:hover::before {
            left: 100%;
        }

        /* Floating particles */
        .particle {
            position: absolute;
            background: rgba(79, 172, 254, 0.1);
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle 20s infinite linear;
            z-index: 3;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Responsive design */
        @media (max-width: 768px) {
            h2 {
                font-size: 2rem;
            }

            h3 {
                font-size: 1.5rem;
            }

            .form-container,
            .table-container {
                padding: 1rem;
            }

            th, td {
                padding: 0.8rem 1rem;
                font-size: 0.9rem;
            }

            form {
                gap: 1rem;
            }
        }

        @keyframes slideDown {
            0% {
                opacity: 0;
                transform: translateY(-30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <!-- Floating particles -->
    <div class="particle" style="width: 8px; height: 8px; left: 5%; animation-delay: 0s;"></div>
    <div class="particle" style="width: 12px; height: 12px; left: 25%; animation-delay: 3s;"></div>
    <div class="particle" style="width: 6px; height: 6px; left: 45%; animation-delay: 6s;"></div>
    <div class="particle" style="width: 10px; height: 10px; left: 65%; animation-delay: 9s;"></div>
    <div class="particle" style="width: 7px; height: 7px; left: 85%; animation-delay: 12s;"></div>

    <div class="container">
        <header>
            <h2><i class="fas fa-graduation-cap"></i>Course Management</h2>
        </header>

        <div class="form-container">
            <h3><i class="fas fa-plus-circle"></i>Add Course</h3>
            <form method="POST" action="/admin/courses/add">
                <label for="name"><i class="fas fa-book"></i>Course Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="description"><i class="fas fa-align-left"></i>Description:</label>
                <textarea id="description" name="description" required></textarea>

                <label for="level"><i class="fas fa-signal"></i>Level:</label>
                <select id="level" name="level">
                    <option value="Beginner">Beginner</option>
                    <option value="Intermediate">Intermediate</option>
                    <option value="Advanced">Advanced</option>
                </select>

                <label for="subjects"><i class="fas fa-tags"></i>Subjects (comma-separated):</label>
                <input type="text" id="subjects" name="subjects" placeholder="Math, Science, History">

                <button type="submit"><i class="fas fa-plus"></i>Add Course</button>
            </form>
        </div>

        <hr>

        <div class="table-container">
            <h3><i class="fas fa-list"></i>Existing Courses</h3>
            <table>
                <thead>
                    <tr>
                        <th><i class="fas fa-hashtag"></i>ID</th>
                        <th><i class="fas fa-book"></i>Name</th>
                        <th><i class="fas fa-align-left"></i>Description</th>
                        <th><i class="fas fa-signal"></i>Level</th>
                        <th><i class="fas fa-tags"></i>Subjects</th>
                        <th><i class="fas fa-cog"></i>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for c in courses %}
                    <tr>
                        <td>{{ c.id }}</td>
                        <td>{{ c.name }}</td>
                        <td>{{ c.description }}</td>
                        <td>{{ c.level }}</td>
                        <td>{{ c.subjects }}</td>
                        <td>
                            <a href="/admin/courses/edit/{{ c.id }}"><i class="fas fa-edit"></i>Edit</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <div class="back-container">
            <a href="/admin/dashboard">
                <i class="fas fa-arrow-left"></i>
                Back to Dashboard
            </a>
        </div>
    </div>

    <script>
        // Add interactive effects to form inputs
        const inputs = document.querySelectorAll('input, textarea, select');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });

        // Add row click interaction
        document.querySelectorAll('tbody tr').forEach(row => {
            row.addEventListener('click', function() {
                // Remove previous selection
                document.querySelectorAll('tbody tr').forEach(r => {
                    r.style.background = '';
                });
                
                // Highlight selected row
                this.style.background = 'rgba(79, 172, 254, 0.2)';
                
                // Add ripple effect
                const ripple = document.createElement('div');
                const rect = this.getBoundingClientRect();
                ripple.style.cssText = `
                    position: absolute;
                    width: 100%;
                    height: 100%;
                    background: rgba(79, 172, 254, 0.3);
                    left: 0;
                    top: 0;
                    animation: rippleEffect 0.6s ease-out forwards;
                    pointer-events: none;
                `;
                this.style.position = 'relative';
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });

        // Add ripple animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes rippleEffect {
                to {
                    opacity: 0;
                    transform: scale(1.5);
                }
            }
        `;
        document.head.appendChild(style);

        // Add form submission animation
        document.querySelector('form').addEventListener('submit', function() {
            const button = this.querySelector('button');
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Adding Course...';
            button.disabled = true;
        });
    </script>
</body>
</html>
